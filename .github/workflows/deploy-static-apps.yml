name: Deploy Static Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-static-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_public:
    name: Deploy Public App
    runs-on: ubuntu-latest
    env:
      VITE_CONTENT_PACK: public
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_RUN_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build and deploy public app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_BUSH_0D8565003_1 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: fredagskoll-frontend
          api_location: api
          output_location: dist

  deploy_team:
    name: Deploy Team App
    runs-on: ubuntu-latest
    env:
      VITE_CONTENT_PACK: team
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_RUN_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build and deploy team app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_GROUND_0B3AA2B03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: fredagskoll-frontend
          api_location: api
          output_location: dist
